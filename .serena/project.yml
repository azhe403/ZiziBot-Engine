# the name by which the project can be referenced within Serena
project_name: "ZiziBot-Engine"

# languages supported by this repository (monorepo: backend + frontend)
languages:
- csharp
- typescript

# the encoding used by text files in the project
encoding: "utf-8"

# whether to use project's .gitignore files to ignore files
ignore_all_files_in_gitignore: true

# list of additional workspace folder paths for cross-package reference support (e.g. in monorepos).
additional_workspace_folders: []

# list of additional paths to ignore in this project.
ignored_paths: []

read_only: false

excluded_tools: []
included_optional_tools: []
fixed_tools: []

default_modes:

added_modes:

# optional initial prompt given to the LLM upon activation
initial_prompt: |
  ZiziBot-Engine monorepo: backend (.NET / C#) + frontend (TypeScript monorepo).
  Project contains multiple Serena-enabled subprojects under `backend/` and `frontend/`.

symbol_info_budget:

read_only_memory_patterns: []
ignored_memory_patterns: []

